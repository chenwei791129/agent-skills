name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.github/workflows/validate-skills.yml'
  pull_request:
    paths:
      - 'skills/**'
      - '.github/workflows/validate-skills.yml'

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure gh CLI >= 2.90 (for `gh skill`)
        run: |
          set -euo pipefail
          current=$(gh --version | awk '/^gh version/ {print $3}')
          need=2.90.0
          if [ "$(printf '%s\n' "$need" "$current" | sort -V | head -n1)" != "$need" ]; then
            echo "gh $current is older than $need, installing latest…"
            version=$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest \
              | jq -r .tag_name | sed 's/^v//')
            curl -fsSL "https://github.com/cli/cli/releases/download/v${version}/gh_${version}_linux_amd64.tar.gz" \
              | tar xz
            sudo mv "gh_${version}_linux_amd64/bin/gh" /usr/local/bin/gh
          fi
          gh --version

      - name: gh skill dry-run
        run: gh skill publish --dry-run
